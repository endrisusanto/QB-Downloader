name: Release Windows NSIS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows NSIS
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm run build

      - name: Test backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri NSIS installer
        run: npm run tauri -- build --bundles nsis

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: qb-downloader-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "QB Downloader ${{ github.ref_name }}"
          body: "Windows NSIS installer and Android dashboard app for QB Downloader."
          files: src-tauri/target/release/bundle/nsis/*.exe

  build-android:
    name: Build Android Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android App (Debug APK)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK for release
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/qb-dashboard.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qb-dashboard-android-apk
          path: android/app/build/outputs/apk/debug/qb-dashboard.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "QB Downloader ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          files: android/app/build/outputs/apk/debug/qb-dashboard.apk

